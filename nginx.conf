location /api/auth/login {
    rewrite ^/api/auth/login/?$ /login.php last;
}

location /api/auth/logout {
    rewrite ^/api/auth/logout/?$ /logout.php last;
}

location /api/auth/callback {
    rewrite ^/api/auth/callback/?$ /callback.php last;
}

location /profile {
    rewrite ^/profile/?$ /profile.php last;
}

location / {
    try_files $uri $uri/ /index.php?$query_string;
}